<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DupliScan</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left h1 { font-size: 18px; }
    #scanCount { font-size: 14px; color: #888; }
    .config-btn { background: none; border: 1px solid #333; color: #aaa; width: 36px; height: 36px; border-radius: 8px; font-size: 18px; cursor: pointer; }
    .config-btn:hover { border-color: #2563eb; color: #fff; }
    .sheet-status { font-size: 11px; color: #555; }
    .sheet-status.connected { color: #52b788; }
    .sheet-status.disconnected { color: #ff6b6b; }
    #scanner-container { width: 100%; max-width: 500px; margin: 0 auto; background: #000; min-height: 220px; }
    #scanner-container video { width: 100%; display: block; }
    #lastScan { text-align: center; padding: 10px; font-size: 15px; color: #aaa; background: #1a1a2e; margin-bottom: 6px; }
    #lastScan .desc { display: block; font-size: 12px; color: #666; }
    #alert { display: none; text-align: center; padding: 10px; font-weight: bold; font-size: 15px; margin: 6px 8px; border-radius: 8px; }
    #alert.success { display: block; background: #1b4332; color: #52b788; }
    #alert.warning { display: block; background: #4a3000; color: #ffd60a; }
    #results-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
    #results-header h2 { font-size: 16px; }
    .header-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .header-buttons button { background: #2563eb; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    #table-wrapper { overflow-x: auto; padding: 0 6px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1a1a2e; padding: 8px 6px; text-align: left; font-size: 12px; color: #666; position: sticky; top: 0; z-index: 1; white-space: nowrap; }
    td { padding: 6px; border-bottom: 1px solid #1a1a2e; font-size: 13px; vertical-align: middle; }
    .name-input, .desc-input { background: transparent; border: 1px solid #2a2a3e; border-radius: 4px; color: #e0e0e0; padding: 3px 5px; font-size: 12px; width: 100%; min-width: 80px; outline: none; }
    .name-input:focus, .desc-input:focus { border-color: #2563eb; }
    tr.duplicate { background: #2d1a1a; }
    .status-icon { font-size: 16px; text-align: center; width: 28px; }
    .status-duplicate { color: #ff4444; font-weight: bold; font-size: 12px; }
    .status-unique { color: #4ade80; font-size: 12px; }
    .count-cell { text-align: center; }
    #actions { padding: 16px; text-align: center; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    #clearBtn { background: #3a1a1a; color: #ff6b6b; border: 1px solid #5a2a2a; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: #1a1a2e; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
    .modal-content h3 { margin-bottom: 12px; font-size: 16px; }
    .modal-content label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
    .modal-content input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background: #0f0f1a; color: #e0e0e0; font-size: 14px; margin-bottom: 12px; outline: none; }
    .modal-content input:focus { border-color: #2563eb; }
    .modal-content .code-display { color: #888; font-size: 13px; margin-bottom: 12px; word-break: break-all; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .modal-buttons button { padding: 9px 18px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #333; color: #aaa; }
    .modal-section { border-top: 1px solid #2a2a3e; padding-top: 16px; margin-top: 16px; }
    .modal-section h4 { font-size: 14px; margin-bottom: 10px; color: #ccc; }
    .file-upload { margin-bottom: 12px; }
    .file-upload input[type="file"] { display: none; }
    .file-upload label { display: inline-block; background: #2a2a3e; color: #aaa; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .file-upload label:hover { background: #3a3a4e; }
    .status-text { font-size: 12px; color: #666; margin-top: 4px; }
    @media (max-width: 480px) { .header-left h1 { font-size: 15px; } th { font-size: 11px; padding: 6px 4px; } td { font-size: 11px; padding: 4px; } .name-input, .desc-input { font-size: 11px; min-width: 60px; } }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1>&#x1F4F7; DupliScan</h1>
        <span id="scanCount">0</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="sheet-status disconnected" id="sheetStatus">&#x26A0;&#xFE0F; Sheet</span>
        <button class="config-btn" onclick="openConfig()">&#x2699;&#xFE0F;</button>
      </div>
    </header>
    <div id="scanner-container"></div>
    <div id="lastScan">Esperando c&oacute;digo...<span class="desc" id="lastScanDesc"></span></div>
    <div id="alert"></div>
    <div id="results-header">
      <h2>Resultados</h2>
      <div class="header-buttons">
        <button onclick="syncAllToSheet()">&#x1F504; Sync</button>
        <button onclick="exportDupExcel()">&#x1F4E5; Duplicados</button>
        <button onclick="exportAllExcel()">&#x1F4E5; Todo</button>
      </div>
    </div>
    <div id="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th style="width:28px"></th>
            <th>C&oacute;digo</th>
            <th>Nombre</th>
            <th>Descripci&oacute;n</th>
            <th style="width:70px">Estado</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="actions">
      <button id="clearBtn" onclick="clearAll()">&#x1F5D1;&#xFE0F; Limpiar todo</button>
    </div>
  </div>

  <div class="modal" id="nameModal">
    <div class="modal-content">
      <h3>&#x1F4E6; Nuevo c&oacute;digo</h3>
      <div class="code-display" id="modalCode"></div>
      <div id="dupWarning" style="display:none;color:#ff6b6b;font-size:13px;margin-bottom:10px;">&#x26A0;&#xFE0F; Este c&oacute;digo ya fue escaneado</div>
      <label>Nombre del producto</label>
      <input type="text" id="modalNameInput" placeholder="..." autocomplete="off">
      <label>Descripci&oacute;n</label>
      <input type="text" id="modalDescInput" placeholder="Lote, estante..." autocomplete="off">
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="skipName()">Omitir</button>
        <button class="btn-primary" onclick="saveName()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="configModal">
    <div class="modal-content">
      <h3>&#x2699;&#xFE0F; Configuraci&oacute;n</h3>
      <label>URL del Google Apps Script</label>
      <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/..." autocomplete="off">
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="btn-primary" onclick="testConnection()">&#x1F50C; Probar</button>
        <button class="btn-secondary" onclick="saveConfig()">&#x1F4BE; Guardar</button>
      </div>
      <div id="connectionStatus" class="status-text"></div>
      <div class="modal-section">
        <h4>&#x1F4CA; Google Sheet</h4>
        <button class="btn-primary" onclick="syncAllToSheet()" style="width:100%;margin-bottom:4px;">&#x1F504; Sincronizar todo</button>
        <button class="btn-primary" onclick="window.location.href='https://docs.google.com/spreadsheets/d/1Y18brymhRJ3KdE2-tHF8bjJxobzlvHjKDtGEdsvhMlE/edit'" style="width:100%;margin-bottom:4px;">&#x1F4C4; Abrir Google Sheet</button>
      </div>
      <div class="modal-section">
        <h4>&#x1F4BE; Backup</h4>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <button class="btn-primary" onclick="downloadBackup()">&#x1F4E5; Descargar</button>
        </div>
        <div class="file-upload">
          <label for="restoreFile">&#x1F4C2; Restaurar (JSON)</label>
          <input type="file" id="restoreFile" accept=".json" onchange="restoreBackup(event)">
        </div>
        <div id="backupStatus" class="status-text"></div>
      </div>
      <div class="modal-buttons" style="margin-top:16px;">
        <button class="btn-secondary" onclick="closeConfig()">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
  var ST = 'barcode_scanner_state', CK = 'dupliscan_config';
  var SU = 'https://script.google.com/macros/s/AKfycbzL0d5OxJ1OBmms_CQ6hazqcNzyEPG-ZQZEA05psZQI31i3yRrIhdd99548MrW8hrfl/exec';
  var scans = JSON.parse(localStorage.getItem(ST)) || [];
  var cfg = JSON.parse(localStorage.getItem(CK));
  if (!cfg || !cfg.scriptUrl) { cfg = { scriptUrl: SU }; localStorage.setItem(CK, JSON.stringify(cfg)); }
  var processing = false, pendingCode = null, pendingIsDup = false, qr = null;

  var CI = '\uD83D\uDCF7', CHK = '\u2705', WARN = '\u26A0\uFE0F', BOX = '\uD83D\uDCE6';

  function startScanner() {
    try {
      qr = new Html5Qrcode("scanner-container");
      qr.start({ facingMode: "environment" }, { fps: 10, qrbox: function(vw, vh) {
        var m = Math.min(vw, vh) * 0.7; return { width: m, height: m * 0.5 };
      }}, onScan, function(){});
    } catch(e) {
      document.getElementById('scanner-container').innerHTML = '<p style="color:#ff6b6b;padding:20px;text-align:center;">Error c\u00e1mara: ' + e.message + '</p>';
    }
  }

  function onScan(t) {
    if (processing) return;
    var c = (t||'').trim();
    if (!c) return;
    processing = true;
    try { navigator.vibrate(100); } catch(e) {}
    flashLine(c);

    if (findScan(c)) {
      // Already scanned before → show warning, always manual entry
      showNameModal(c, true);
    } else {
      // New code → check sheet, then show modal
      sheetFind(c).then(function(d) {
        // Pre-fill modal with sheet data if found (user still clicks Guardar)
        var prefill = (d && d.found) ? { name: d.nombre||'', desc: d.descripcion||'' } : { name: '', desc: '' };
        showNameModal(c, false, prefill);
      }).catch(function() {
        showNameModal(c, false, { name: '', desc: '' });
      });
    }
  }

  function getMaxId() {
    var m = 0;
    for (var i = 0; i < scans.length; i++) { if (scans[i].id > m) m = scans[i].id; }
    return m;
  }

  function findScan(c) { for (var i=0;i<scans.length;i++) { if (scans[i].code===c) return scans[i]; } return null; }

  function showNameModal(c, isDup, prefill) {
    pendingCode = c;
    pendingIsDup = isDup;
    prefill = prefill || { name: '', desc: '' };
    document.getElementById('modalCode').textContent = BOX + ' ' + c;
    document.getElementById('modalNameInput').value = prefill.name;
    document.getElementById('modalDescInput').value = prefill.desc;
    document.getElementById('dupWarning').style.display = isDup ? 'block' : 'none';
    document.getElementById('nameModal').classList.add('active');
    setTimeout(function(){document.getElementById('modalNameInput').focus();},300);
  }

  function saveName() {
    var n = document.getElementById('modalNameInput').value.trim();
    var d = document.getElementById('modalDescInput').value.trim();
    var c = pendingCode;
    if (!c) { processing = false; return; }
    pendingCode = null;

    scans.push({ id: getMaxId() + 1, code: c, name: n, descripcion: d, status: pendingIsDup ? 'duplicate' : 'unique' });
    saveState();
    addRow(scans[scans.length-1]);
    updateLast(c, n, d, pendingIsDup);
    document.getElementById('nameModal').classList.remove('active');
    processing = false;

    sheetAdd(scans[scans.length-1]);
  }

  function skipName() {
    document.getElementById('modalNameInput').value = '';
    document.getElementById('modalDescInput').value = '';
    saveName();
  }

  document.getElementById('modalNameInput').addEventListener('keydown', function(e) {
    if (e.key==='Enter') document.getElementById('modalDescInput').focus();
  });
  document.getElementById('modalDescInput').addEventListener('keydown', function(e) {
    if (e.key==='Enter') saveName();
  });

  function addRow(s) {
    var t = document.getElementById('tableBody');
    var r = document.createElement('tr');
    r.setAttribute('data-code', s.code);
    var dup = s.status === 'duplicate';
    r.className = dup ? 'duplicate' : 'unique';
    var icon = dup ? WARN : CHK;
    var label = dup ? (WARN + ' REPETIDO') : (CHK + ' \u00danico');
    r.innerHTML = '<td>' + (s.id||'') + '</td><td class="status-icon">' + icon + '</td><td>' + esc(s.code) + '</td>' +
      '<td><input type="text" class="name-input" value="' + esc(s.name||'') + '" data-code="' + escA(s.code) + '" placeholder="Nombre..." onchange="upd(this.dataset.code,\'name\',this.value)"></td>' +
      '<td><input type="text" class="desc-input" value="' + esc(s.descripcion||'') + '" data-code="' + escA(s.code) + '" placeholder="Desc..." onchange="upd(this.dataset.code,\'descripcion\',this.value)"></td>' +
      '<td class="' + (dup ? 'status-duplicate' : 'status-unique') + '">' + label + '</td>';
    t.insertBefore(r, t.firstChild); cnt();
  }

  function upd(c, f, v) { var s = findScan(c); if (s) { s[f]=v; saveState(); } }

  function renderAll() {
    var t = document.getElementById('tableBody'); t.innerHTML = '';
    for (var i=scans.length-1;i>=0;i--) { addRow(scans[i]); }
    cnt();
  }

  function cnt() { document.getElementById('scanCount').textContent = scans.length; }

  function flashLine(c) {
    var e = document.getElementById('lastScan');
    e.innerHTML = CI + ' ' + esc(c) + '<span class="desc"></span>';
    e.style.background = '#2563eb';
    setTimeout(function(){e.style.background='#1a1a2e';}, 300);
  }

  function updateLast(c, n, d, dup) {
    var e = document.getElementById('lastScan');
    e.innerHTML = '\u00daltimo: ' + esc(c) + (n?' \u2014 '+esc(n):'') + '<span class="desc">' + esc(d||'') + '</span>';
    e.style.color = dup ? '#ff6b6b' : '#52b788';
  }

  function showAlert(m, t) {
    var e = document.getElementById('alert');
    e.textContent = m; e.className = t;
    clearTimeout(e._to); e._to = setTimeout(function(){e.style.display='none';},2500);
  }

  function esc(t) { var d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
  function escA(t) { return String(t).replace(/"/g,'&quot;'); }
  function saveState() { localStorage.setItem(ST, JSON.stringify(scans)); }

  function clearAll() {
    if (!confirm('\u00bfLimpiar todos los escaneos?')) return;
    scans = []; saveState(); renderAll();
    document.getElementById('lastScan').innerHTML = 'Esperando c\u00f3digo...<span class="desc"></span>';
  }

  function su(p) { p._cb = Date.now(); return cfg.scriptUrl + '?' + new URLSearchParams(p).toString(); }

  function sheetFind(c) {
    if (!cfg.scriptUrl) return Promise.reject();
    return fetch(su({action:'find',code:c}),{cache:'no-store'})
      .then(function(r){return r.ok?r.json():Promise.reject();})
      .then(function(d){return d.error?null:d;}).catch(function(){return null;});
  }

  function sheetAdd(s) {
    if (!cfg.scriptUrl) return;
    fetch(su({action:'addScan',code:s.code,nombre:s.name||'',descripcion:s.descripcion||'',estado:s.status==='duplicate'?WARN+' REPETIDO':CHK+' \u00danico'}),{cache:'no-store'})
      .then(function(r){if(r.ok) ss(true);}).catch(function(){ss(false);});
  }

  function syncAllToSheet() {
    if (!cfg.scriptUrl) { showAlert('No hay URL', 'warning'); return; }
    if (scans.length===0) { showAlert('No hay datos', 'warning'); return; }
    fetch(su({action:'syncAll',scans:JSON.stringify(scans)}),{cache:'no-store'})
      .then(function(r){if(r.ok){showAlert('Sincronizados '+scans.length,'success');ss(true);}else{showAlert('Error HTTP '+r.status,'warning');}})
      .catch(function(){showAlert('Error de red','warning');});
  }

  function ss(ok) {
    document.getElementById('sheetStatus').textContent = ok ? (CHK + ' Sheet') : (WARN + ' Sheet');
    document.getElementById('sheetStatus').className = 'sheet-status ' + (ok?'connected':'disconnected');
  }

  function openConfig() {
    document.getElementById('scriptUrlInput').value = cfg.scriptUrl||'';
    document.getElementById('connectionStatus').textContent = '';
    document.getElementById('backupStatus').textContent = '';
    document.getElementById('configModal').classList.add('active');
  }
  function closeConfig() { document.getElementById('configModal').classList.remove('active'); }
  function saveConfig() { cfg.scriptUrl=document.getElementById('scriptUrlInput').value.trim(); localStorage.setItem(CK,JSON.stringify(cfg)); showAlert('Guardado','success'); }

  function testConnection() {
    var u = document.getElementById('scriptUrlInput').value.trim();
    if (!u) { document.getElementById('connectionStatus').textContent = 'Ingrese una URL'; return; }
    cfg.scriptUrl = u; localStorage.setItem(CK, JSON.stringify(cfg));
    document.getElementById('connectionStatus').textContent = 'Probando...';
    fetch(su({action:'getAll'}),{cache:'no-store'})
      .then(function(r){return r.ok?r.json():Promise.reject(r.status);})
      .then(function(d){
        if (d&&d.error) { document.getElementById('connectionStatus').textContent = 'Error: '+d.error; return; }
        ss(true);
        document.getElementById('connectionStatus').textContent = 'Conectado! ' + (Array.isArray(d)?d.length+' registros':'');
      }).catch(function(e){document.getElementById('connectionStatus').textContent = 'Error: '+e;});
  }

  function exportDupExcel() {
    var d = scans.filter(function(s){return s.status==='duplicate';});
    if (d.length===0) { showAlert('No hay duplicados','warning'); return; }
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(d.map(function(s,i){return {'#':s.id||i+1,'C\u00f3digo':s.code,'Nombre':s.name||'','Descripci\u00f3n':s.descripcion||''};})), 'Duplicados');
    XLSX.writeFile(wb, 'duplicados_'+Date.now()+'.xlsx');
    showAlert('Exportados '+d.length+' duplicados','success');
  }

  function exportAllExcel() {
    if (scans.length===0) { showAlert('No hay datos','warning'); return; }
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(scans.map(function(s,i){return {'#':s.id||i+1,'C\u00f3digo':s.code,'Nombre':s.name||'','Descripci\u00f3n':s.descripcion||'','Estado':s.status==='duplicate'?'REPETIDO':'\u00danico'};})), 'Escaneos');
    XLSX.writeFile(wb, 'escaneos_'+Date.now()+'.xlsx');
    showAlert('Exportados '+scans.length+' registros','success');
  }

  function downloadBackup() {
    if (scans.length===0) { showAlert('No hay datos','warning'); return; }
    var b = new Blob([JSON.stringify(scans,null,2)],{type:'application/json'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(b);
    a.download = 'backup_'+Date.now()+'.json'; a.click();
    document.getElementById('backupStatus').textContent = 'Backup descargado ('+scans.length+' registros)';
  }

  function restoreBackup(ev) {
    var f = ev.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(e) {
      try {
        var d = JSON.parse(e.target.result);
        if (!Array.isArray(d)) throw new Error('Formato inv\u00e1lido');
        scans = d; saveState(); renderAll();
        document.getElementById('backupStatus').textContent = 'Restaurados '+scans.length+' registros';
        showAlert('Backup cargado','success');
      } catch(err) { document.getElementById('backupStatus').textContent = 'Error: '+err.message; }
    };
    r.readAsText(f); ev.target.value = '';
  }

  startScanner(); renderAll();
  if (cfg.scriptUrl) { fetch(su({action:'getAll'}),{cache:'no-store'}).then(function(r){if(r.ok)ss(true);}).catch(function(){}); }
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function(){}); }
  </script>
</body>
</html>
