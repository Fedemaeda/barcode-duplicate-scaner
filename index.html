<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DupliScan</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    #scanner-container { width: 100%; max-width: 500px; background: #000; min-height: 300px; }
    #scanner-container video { width: 100%; display: block; }
    #result { text-align: center; padding: 20px; font-size: 18px; font-weight: bold; min-height: 60px; color: #52b788; }
  </style>
</head>
<body>
  <div id="scanner-container"></div>
  <div id="result">Esperando c&oacute;digo...</div>

  <script>
  var SU = 'https://script.google.com/macros/s/AKfycbx8axoEdtPPiDOb7MHWud7IDUgFiApJ8zA0GUiODVFn3fz2U7sweQ4q84F8KovxXMU/exec';
  var processing = false;

  function startScanner() {
    try {
      var qr = new Html5Qrcode("scanner-container");
      qr.start({ facingMode: "environment" }, { fps: 10, qrbox: function(vw, vh) {
        var m = Math.min(vw, vh) * 0.7; return { width: m, height: m * 0.5 };
      }}, function(code) {
        if (processing) return;
        code = (code||'').trim();
        if (!code) return;
        processing = true;
        try { navigator.vibrate(100); } catch(e) {}
        document.getElementById('result').textContent = 'Enviando: ' + code;

        // Send code to Sheet. Sheet does ALL the work.
        fetch(SU + '?action=addScan&code=' + encodeURIComponent(code) + '&_=' + Date.now(), { cache: 'no-store' })
          .then(function() {
            document.getElementById('result').textContent = 'Enviado: ' + code;
          })
          .catch(function() {
            document.getElementById('result').textContent = 'Error al enviar: ' + code;
          })
          .finally(function() {
            setTimeout(function(){ processing = false; }, 1500);
          });
      }, function(){});
    } catch(e) {
      document.getElementById('result').textContent = 'Error c\u00e1mara: ' + e.message;
    }
  }

  startScanner();
  </script>
</body>
</html>
