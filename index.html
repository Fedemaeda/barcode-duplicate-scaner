<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DupliScan - Lector de Códigos</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left h1 { font-size: 18px; }
    #scanCount { font-size: 14px; color: #888; }
    .config-btn { background: none; border: 1px solid #333; color: #aaa; width: 36px; height: 36px; border-radius: 8px; font-size: 18px; cursor: pointer; }
    .config-btn:hover { border-color: #1d4ed8; color: #fff; }
    .sheet-status { font-size: 11px; color: #555; }
    .sheet-status.connected { color: #52b788; }
    .sheet-status.disconnected { color: #ff6b6b; }
    #scanner-container { width: 100%; max-width: 500px; margin: 0 auto; background: #000; min-height: 220px; }
    #scanner-container video { width: 100%; display: block; }
    #lastScan { text-align: center; padding: 10px; font-size: 15px; color: #aaa; background: #1a1a2e; margin-bottom: 6px; }
    #lastScan .desc { display: block; font-size: 12px; color: #666; }
    #alert { display: none; text-align: center; padding: 10px; font-weight: bold; font-size: 15px; margin: 6px 8px; border-radius: 8px; }
    #alert.success { display: block; background: #1b4332; color: #52b788; }
    #alert.warning { display: block; background: #4a3000; color: #ffd60a; }
    #results-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
    #results-header h2 { font-size: 16px; }
    .header-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .header-buttons button { background: #1d4ed8; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    #table-wrapper { overflow-x: auto; padding: 0 6px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1a1a2e; padding: 8px 6px; text-align: left; font-size: 12px; color: #666; position: sticky; top: 52px; white-space: nowrap; }
    td { padding: 6px; border-bottom: 1px solid #1a1a2e; font-size: 13px; vertical-align: middle; }
    .name-input, .desc-input { background: transparent; border: 1px solid #2a2a3e; border-radius: 4px; color: #e0e0e0; padding: 3px 5px; font-size: 12px; width: 100%; min-width: 80px; outline: none; }
    .name-input:focus, .desc-input:focus { border-color: #1d4ed8; }
    tr.duplicate { background: #2d1a1a; }
    .status-icon { font-size: 16px; text-align: center; width: 28px; }
    .status-duplicate { color: #ff4444; font-weight: bold; font-size: 12px; }
    .status-unique { color: #4ade80; font-size: 12px; }
    .count-cell { text-align: center; }
    #actions { padding: 16px; text-align: center; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    #clearBtn { background: #3a1a1a; color: #ff6b6b; border: 1px solid #5a2a2a; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: #1a1a2e; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
    .modal-content h3 { margin-bottom: 12px; font-size: 16px; }
    .modal-content label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
    .modal-content input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background: #0f0f1a; color: #e0e0e0; font-size: 14px; margin-bottom: 12px; outline: none; }
    .modal-content input:focus { border-color: #1d4ed8; }
    .modal-content .code-display { color: #888; font-size: 13px; margin-bottom: 12px; word-break: break-all; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .modal-buttons button { padding: 9px 18px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #1d4ed8; color: #fff; }
    .btn-secondary { background: #333; color: #aaa; }
    .modal-section { border-top: 1px solid #2a2a3e; padding-top: 16px; margin-top: 16px; }
    .modal-section h4 { font-size: 14px; margin-bottom: 10px; color: #ccc; }
    .file-upload { margin-bottom: 12px; }
    .file-upload input[type="file"] { display: none; }
    .file-upload label { display: inline-block; background: #2a2a3e; color: #aaa; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .file-upload label:hover { background: #3a3a4e; }
    .status-text { font-size: 12px; color: #666; margin-top: 4px; }
    @media (max-width: 480px) { .header-left h1 { font-size: 15px; } th { font-size: 11px; padding: 6px 4px; } td { font-size: 11px; padding: 4px; } .name-input, .desc-input { font-size: 11px; min-width: 60px; } }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1>📷 DupliScan</h1>
        <span id="scanCount">0</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="sheet-status disconnected" id="sheetStatus">⛔ Sheet</span>
        <button class="config-btn" onclick="openConfig()">⚙️</button>
      </div>
    </header>
    <div id="scanner-container"></div>
    <div id="lastScan">Esperando código...<span class="desc" id="lastScanDesc"></span></div>
    <div id="alert"></div>
    <div id="results-header">
      <h2>Resultados</h2>
      <div class="header-buttons">
        <button onclick="exportDupExcel()">📥 Excel duplicados</button>
        <button onclick="exportAllExcel()">📥 Excel todo</button>
      </div>
    </div>
    <div id="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th style="width:28px"></th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th style="width:40px">Veces</th>
            <th style="width:70px">Estado</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="actions">
      <button id="clearBtn" onclick="clearAll()">🗑️ Limpiar todo</button>
    </div>
  </div>

  <div class="modal" id="nameModal">
    <div class="modal-content">
      <h3>📦 Nuevo código</h3>
      <div class="code-display" id="modalCode"></div>
      <label>Nombre del producto</label>
      <input type="text" id="modalNameInput" placeholder="..." autocomplete="off">
      <label>Descripción</label>
      <input type="text" id="modalDescInput" placeholder="Lote, estante..." autocomplete="off">
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="skipName()">Omitir</button>
        <button class="btn-primary" onclick="saveName()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="configModal">
    <div class="modal-content">
      <h3>⚙️ Configuración</h3>
      <label>URL del Google Apps Script</label>
      <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/..." autocomplete="off">
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="btn-primary" onclick="testConnection()">🔌 Probar conexión</button>
        <button class="btn-secondary" onclick="saveConfig()">💾 Guardar</button>
      </div>
      <div id="connectionStatus" class="status-text"></div>
      <div class="modal-section">
        <h4>📊 Google Sheet</h4>
        <button class="btn-primary" onclick="syncAllToSheet()" style="width:100%;margin-bottom:4px;">🔄 Sincronizar todo</button>
        <button class="btn-primary" onclick="window.location.href='https://docs.google.com/spreadsheets/d/1Y18brymhRJ3KdE2-tHF8bjJxobzlvHjKDtGEdsvhMlE/edit'" style="width:100%;margin-bottom:4px;">📄 Abrir Google Sheet</button>
      </div>
      <div class="modal-section">
        <h4>💾 Backup</h4>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <button class="btn-primary" onclick="downloadBackup()">📥 Descargar</button>
        </div>
        <div class="file-upload">
          <label for="restoreFile">📂 Restaurar (JSON)</label>
          <input type="file" id="restoreFile" accept=".json" onchange="restoreBackup(event)">
        </div>
        <div id="backupStatus" class="status-text"></div>
      </div>
      <div class="modal-buttons" style="margin-top:16px;">
        <button class="btn-secondary" onclick="closeConfig()">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
  // ── CONFIG ──────────────────────────────────────────────
  const STATE_KEY = 'barcode_scanner_state';
  const CONFIG_KEY = 'dupliscan_config';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwI8FsLZ3F5msFsQ5aot7jPpSDkU5DrJzExEutnncM--knwuGTW-z80s25TwiqBpCo/exec';

  let scans = JSON.parse(localStorage.getItem(STATE_KEY)) || [];
  let config = JSON.parse(localStorage.getItem(CONFIG_KEY));
  if (!config || !config.scriptUrl) {
    config = { scriptUrl: SCRIPT_URL };
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
  }
  let processing = false;
  let pendingCode = null;
  let html5QrCode = null;

  // ── SCANNER ──────────────────────────────────────────────
  function startScanner() {
    try {
      html5QrCode = new Html5Qrcode("scanner-container");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: function(vw, vh) {
            var min = Math.min(vw, vh) * 0.7;
            return { width: min, height: min * 0.5 };
          }
        },
        onScan,
        function() {}
      );
    } catch(e) {
      document.getElementById('scanner-container').innerHTML =
        '<p style="color:#ff6b6b;padding:20px;text-align:center;">Error cámara: ' + e.message + '</p>';
    }
  }

  // ── SCAN PIPELINE ─────────────────────────────────────────
  // Simple state machine:
  //   Not processing → code detected → processing = true
  //     → check local → duplicate? → update table → processing = false
  //     → check sheet → found? → add to table → processing = false
  //                     → not found? → show modal → user saves → processing = false
  //   ALL paths unlock processing. No race conditions.

  function onScan(decodedText) {
    if (processing) return;
    var code = (decodedText || '').trim();
    if (!code) return;

    processing = true;
    try { navigator.vibrate(100); } catch(e) {}

    flashLine(code);

    // Check local duplicates first (synchronous)
    var local = findScan(code);
    if (local) {
      local.count += 1;
      local.status = 'duplicate';
      saveState();
      updateRow(local);
      showLast(code, local.name, local.descripcion, true);
      showAlert('⚠️ REPETIDO: ' + code, 'warning');
      sheetAddScan(local);
      processing = false;
      return;
    }

    // New code — check sheet lookup
    sheetFind(code).then(function(data) {
      if (data && data.found) {
        addScan(code, data.nombre || '', data.descripcion || '', false);
        showAlert('✅ ' + (data.nombre || code) + ' — desde Sheet', 'success');
        sheetAddScan(scans[scans.length - 1]);
        processing = false;
      } else if (data && data.error) {
        // Sheet error — still allow manual entry
        showNameModal(code);
      } else {
        // Not found in sheet — ask for name
        showNameModal(code);
      }
    }).catch(function() {
      // Network error — still allow manual entry
      showNameModal(code);
    });
  }

  function findScan(code) {
    for (var i = 0; i < scans.length; i++) {
      if (scans[i].code === code) return scans[i];
    }
    return null;
  }

  function addScan(code, name, desc, fromSheet) {
    scans.push({ code: code, name: name, descripcion: desc, count: 1, status: 'unique' });
    saveState();
    addRow(scans[scans.length - 1]);
    showLast(code, name, desc, false);
  }

  function showNameModal(code) {
    pendingCode = code;
    document.getElementById('modalCode').textContent = '📦 ' + code;
    document.getElementById('modalNameInput').value = '';
    document.getElementById('modalDescInput').value = '';
    document.getElementById('nameModal').classList.add('active');
    setTimeout(function() { document.getElementById('modalNameInput').focus(); }, 300);
  }

  // ── NAME MODAL ────────────────────────────────────────────
  function saveName() {
    var name = document.getElementById('modalNameInput').value.trim();
    var desc = document.getElementById('modalDescInput').value.trim();
    var code = pendingCode;
    if (!code) { processing = false; return; }
    pendingCode = null;

    addScan(code, name, desc, false);
    var s = scans[scans.length - 1];
    showAlert('✅ ' + (name || code), 'success');
    sheetAddScan(s);

    document.getElementById('nameModal').classList.remove('active');
    processing = false;
  }

  function skipName() {
    document.getElementById('modalNameInput').value = '';
    document.getElementById('modalDescInput').value = '';
    saveName();
  }

  document.getElementById('modalNameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('modalDescInput').focus();
  });
  document.getElementById('modalDescInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') saveName();
  });

  // ── TABLE ──────────────────────────────────────────────────
  function addRow(scan) {
    var tbody = document.getElementById('tableBody');
    var tr = document.createElement('tr');
    tr.className = 'unique';
    tr.setAttribute('data-code', scan.code);
    tr.innerHTML =
      '<td class="status-icon">✅</td>' +
      '<td>' + esc(scan.code) + '</td>' +
      '<td><input type="text" class="name-input" value="' + esc(scan.name || '') + '" data-code="' + escAttr(scan.code) + '" placeholder="Nombre..." onchange="updateField(this.dataset.code,\'name\',this.value)"></td>' +
      '<td><input type="text" class="desc-input" value="' + esc(scan.descripcion || '') + '" data-code="' + escAttr(scan.code) + '" placeholder="Desc..." onchange="updateField(this.dataset.code,\'descripcion\',this.value)"></td>' +
      '<td class="count-cell">1</td>' +
      '<td class="status-unique">Único</td>';
    tbody.insertBefore(tr, tbody.firstChild);
    updateCounter();
  }

  function updateRow(scan) {
    var tr = document.getElementById('tableBody').querySelector('tr[data-code="' + escAttr(scan.code) + '"]');
    if (!tr) { addRow(scan); return; }
    tr.className = 'duplicate';
    tr.querySelector('.status-icon').textContent = '⚠️';
    tr.querySelector('.count-cell').textContent = scan.count;
    try { tr.querySelector('.status-unique').className = 'status-duplicate'; } catch(e) {}
    try { tr.querySelector('.status-duplicate').textContent = 'REPETIDO'; } catch(e) {}
    document.getElementById('tableBody').insertBefore(tr, document.getElementById('tableBody').firstChild);
  }

  function updateField(code, field, value) {
    var s = findScan(code);
    if (s) { s[field] = value; saveState(); }
  }

  function renderAllRows() {
    var tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    var sorted = scans.slice().sort(function(a, b) {
      if (a.status === 'duplicate' && b.status !== 'duplicate') return -1;
      if (a.status !== 'duplicate' && b.status === 'duplicate') return 1;
      return 0;
    });
    for (var i = 0; i < sorted.length; i++) {
      if (sorted[i].status === 'duplicate') updateRow(sorted[i]);
      else addRow(sorted[i]);
    }
    updateCounter();
  }

  function updateCounter() {
    document.getElementById('scanCount').textContent = scans.length;
  }

  // ── UI HELPERS ────────────────────────────────────────────
  function flashLine(code) {
    var el = document.getElementById('lastScan');
    el.innerHTML = '📷 ' + esc(code) + '<span class="desc"></span>';
    el.style.background = '#1d4ed8';
    setTimeout(function() { el.style.background = '#1a1a2e'; }, 300);
  }

  function showLast(code, name, desc, isDup) {
    var el = document.getElementById('lastScan');
    el.innerHTML = 'Último: ' + esc(code) + (name ? ' — ' + esc(name) : '') + '<span class="desc">' + esc(desc || '') + '</span>';
    el.style.color = isDup ? '#ff6b6b' : '#52b788';
  }

  function showAlert(msg, type) {
    var el = document.getElementById('alert');
    el.textContent = msg;
    el.className = type;
    clearTimeout(el._timeout);
    el._timeout = setTimeout(function() { el.style.display = 'none'; }, 2500);
  }

  function esc(text) {
    var d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }
  function escAttr(text) {
    return String(text).replace(/"/g, '&quot;');
  }

  function saveState() {
    localStorage.setItem(STATE_KEY, JSON.stringify(scans));
  }

  function clearAll() {
    if (!confirm('¿Limpiar todos los escaneos?')) return;
    scans = [];
    saveState();
    renderAllRows();
    document.getElementById('lastScan').innerHTML = 'Esperando código...<span class="desc"></span>';
  }

  // ── SHEET ──────────────────────────────────────────────────
  function sheetUrl(params) {
    params._cb = Date.now();
    return config.scriptUrl + '?' + new URLSearchParams(params).toString();
  }

  function sheetFind(code) {
    if (!config.scriptUrl) return Promise.reject();
    return fetch(sheetUrl({ action: 'find', code: code }), { cache: 'no-store' })
      .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function(d) { return d.error ? null : d; })
      .catch(function() { return null; });
  }

  function sheetAddScan(scan) {
    if (!config.scriptUrl) return;
    fetch(sheetUrl({
      action: 'addScan',
      code: scan.code,
      nombre: scan.name || '',
      descripcion: scan.descripcion || '',
      estado: scan.status === 'duplicate' ? '⚠️ REPETIDO' : '✓ Único'
    }), { cache: 'no-store', method: 'GET' })
      .then(function(r) { if (r.ok) updateSheetStatus(true); })
      .catch(function() { updateSheetStatus(false); });
  }

  function syncAllToSheet() {
    if (!config.scriptUrl) { showAlert('⛔ No hay URL configurada', 'warning'); return; }
    if (scans.length === 0) { showAlert('No hay datos', 'warning'); return; }
    fetch(sheetUrl({ action: 'syncAll', scans: JSON.stringify(scans) }), { cache: 'no-store' })
      .then(function(r) {
        if (r.ok) { showAlert('✅ Sincronizados ' + scans.length + ' registros', 'success'); updateSheetStatus(true); }
        else { showAlert('⛔ Error HTTP ' + r.status, 'warning'); }
      })
      .catch(function() { showAlert('⛔ Error de red', 'warning'); });
  }

  function updateSheetStatus(ok) {
    var el = document.getElementById('sheetStatus');
    el.textContent = ok ? '✅ Sheet' : '⛔ Sheet';
    el.className = 'sheet-status ' + (ok ? 'connected' : 'disconnected');
  }

  // ── CONFIG MODAL ──────────────────────────────────────────
  function openConfig() {
    document.getElementById('scriptUrlInput').value = config.scriptUrl || '';
    document.getElementById('connectionStatus').textContent = '';
    document.getElementById('backupStatus').textContent = '';
    document.getElementById('configModal').classList.add('active');
  }
  function closeConfig() {
    document.getElementById('configModal').classList.remove('active');
  }
  function saveConfig() {
    config.scriptUrl = document.getElementById('scriptUrlInput').value.trim();
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    showAlert('✅ Guardado', 'success');
  }
  function testConnection() {
    var url = document.getElementById('scriptUrlInput').value.trim();
    if (!url) { document.getElementById('connectionStatus').textContent = '❌ Ingresá una URL'; return; }
    config.scriptUrl = url;
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    document.getElementById('connectionStatus').textContent = '🔌 Probando...';
    fetch(sheetUrl({ action: 'getAll' }), { cache: 'no-store' })
      .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(data) {
        if (data && data.error) { document.getElementById('connectionStatus').textContent = '❌ ' + data.error; return; }
        updateSheetStatus(true);
        document.getElementById('connectionStatus').textContent = '✅ Conectado! ' + (Array.isArray(data) ? data.length + ' registros' : '');
      })
      .catch(function(e) { document.getElementById('connectionStatus').textContent = '❌ ' + e; });
  }

  // ── EXCEL ──────────────────────────────────────────────────
  function exportDupExcel() {
    var dup = scans.filter(function(s) { return s.status === 'duplicate'; });
    if (dup.length === 0) { showAlert('No hay duplicados', 'warning'); return; }
    var data = dup.map(function(s, i) { return { '#': i + 1, 'Código': s.code, 'Nombre': s.name || '', 'Descripción': s.descripcion || '', 'Veces': s.count }; });
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Duplicados');
    XLSX.writeFile(wb, 'duplicados_' + Date.now() + '.xlsx');
    showAlert('✅ Exportados ' + dup.length + ' duplicados', 'success');
  }

  function exportAllExcel() {
    if (scans.length === 0) { showAlert('No hay datos', 'warning'); return; }
    var data = scans.map(function(s, i) { return { '#': i + 1, 'Código': s.code, 'Nombre': s.name || '', 'Descripción': s.descripcion || '', 'Veces': s.count, 'Estado': s.status === 'duplicate' ? '⚠️ REPETIDO' : '✓ Único' }; });
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Escaneos');
    XLSX.writeFile(wb, 'escaneos_' + Date.now() + '.xlsx');
    showAlert('✅ Exportados ' + scans.length + ' registros', 'success');
  }

  // ── BACKUP ─────────────────────────────────────────────────
  function downloadBackup() {
    if (scans.length === 0) { showAlert('No hay datos', 'warning'); return; }
    var blob = new Blob([JSON.stringify(scans, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'backup_' + Date.now() + '.json';
    a.click();
    document.getElementById('backupStatus').textContent = '✅ Backup descargado (' + scans.length + ' registros)';
  }

  function restoreBackup(ev) {
    var file = ev.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw new Error('Formato inválido');
        scans = data;
        saveState();
        renderAllRows();
        document.getElementById('backupStatus').textContent = '✅ Restaurados ' + scans.length + ' registros';
        showAlert('✅ Backup cargado', 'success');
      } catch(err) {
        document.getElementById('backupStatus').textContent = '❌ ' + err.message;
      }
    };
    reader.readAsText(file);
    ev.target.value = '';
  }

  // ── INIT ───────────────────────────────────────────────────
  startScanner();
  renderAllRows();
  if (config.scriptUrl) {
    fetch(sheetUrl({ action: 'getAll' }), { cache: 'no-store' })
      .then(function(r) { if (r.ok) updateSheetStatus(true); })
      .catch(function() {});
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }
  </script>
</body>
</html>
