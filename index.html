<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Detector de Códigos Duplicados</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

    header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 18px; }
    #scanCount { font-size: 14px; color: #888; }

    #scanner-container { width: 100%; max-width: 500px; margin: 0 auto; background: #000; min-height: 220px; }
    #scanner-container video { width: 100%; display: block; }

    #lastScan { text-align: center; padding: 12px; font-size: 16px; color: #aaa; background: #1a1a2e; margin-bottom: 8px; }

    #alert { display: none; text-align: center; padding: 10px; font-weight: bold; font-size: 16px; margin: 8px; border-radius: 8px; }
    #alert.success { display: block; background: #1b4332; color: #52b788; }
    #alert.warning { display: block; background: #4a3000; color: #ffd60a; }

    #results-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    #results-header h2 { font-size: 16px; }
    .header-buttons { display: flex; gap: 8px; }
    #exportBtn, #sheetsBtn { background: #1d4ed8; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    #exportBtn:hover, #sheetsBtn:hover { background: #2563eb; }

    #table-wrapper { overflow-x: auto; padding: 0 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1a1a2e; padding: 10px 8px; text-align: left; font-size: 13px; color: #888; position: sticky; top: 52px; white-space: nowrap; }
    td { padding: 8px; border-bottom: 1px solid #1e1e30; font-size: 14px; }
    .name-input { background: transparent; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; padding: 4px 6px; font-size: 13px; width: 100%; min-width: 100px; outline: none; }
    .name-input:focus { border-color: #1d4ed8; }
    tr.duplicate { background: #2d1a1a; }
    tr.duplicate td:first-child { color: #ff4444; }
    tr.unique td:first-child { color: #4ade80; }
    .status-icon { font-size: 18px; text-align: center; width: 32px; }
    .status-duplicate { color: #ff4444; font-weight: bold; }
    .status-unique { color: #4ade80; }

    #actions { padding: 16px; text-align: center; }
    #clearBtn { background: #3a1a1a; color: #ff6b6b; border: 1px solid #5a2a2a; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }

    /* Modal for product name input */
    #nameModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
    #nameModal.active { display: flex; }
    .modal-content { background: #1a1a2e; border-radius: 16px; padding: 24px; width: 90%; max-width: 380px; }
    .modal-content h3 { margin-bottom: 8px; font-size: 16px; }
    .modal-content .code-display { color: #888; font-size: 14px; margin-bottom: 16px; word-break: break-all; }
    .modal-content input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0f0f1a; color: #e0e0e0; font-size: 16px; margin-bottom: 16px; outline: none; }
    .modal-content input:focus { border-color: #1d4ed8; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-buttons button { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
    .btn-save { background: #1d4ed8; color: #fff; }
    .btn-skip { background: #333; color: #aaa; }

    @media (max-width: 480px) {
      header h1 { font-size: 16px; }
      th, td { font-size: 12px; padding: 6px 4px; }
      .name-input { font-size: 12px; min-width: 80px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>📷 Escáner de Códigos</h1>
      <span id="scanCount">0 escaneados</span>
    </header>

    <div id="scanner-container"></div>
    <div id="lastScan">Esperando código...</div>
    <div id="alert"></div>

    <div id="results-header">
      <h2>Resultados</h2>
      <div class="header-buttons">
        <button id="sheetsBtn" onclick="syncToSheets()">🔗 Google Sheets</button>
        <button id="exportBtn" onclick="exportExcel()">📥 Exportar Excel</button>
      </div>
    </div>

    <div id="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th></th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Veces</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div id="actions">
      <button id="clearBtn" onclick="clearAll()">🗑️ Limpiar todo</button>
    </div>
  </div>

  <!-- Modal for product name -->
  <div id="nameModal">
    <div class="modal-content">
      <h3>Producto escaneado</h3>
      <div class="code-display" id="modalCode"></div>
      <input type="text" id="modalNameInput" placeholder="Nombre del producto..." autocomplete="off">
      <div class="modal-buttons">
        <button class="btn-skip" onclick="skipName()">Omitir</button>
        <button class="btn-save" onclick="saveName()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const STATE_KEY = 'barcode_scanner_state';
    let scans = JSON.parse(localStorage.getItem(STATE_KEY)) || [];
    let html5QrcodeScanner = null;
    let pendingCode = null;
    const SHEETS_URL = '';

    function startScanner() {
      try {
        html5QrcodeScanner = new Html5QrcodeScanner(
          "scanner-container",
          { fps: 10, qrbox: { width: 250, height: 150 }, aspectRatio: 1.0 },
          false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanError);
      } catch(e) {
        document.getElementById('scanner-container').innerHTML = '<p style="color:#ff6b6b;padding:20px;text-align:center;">Error al iniciar la cámara. Asegurate de usar HTTPS o localhost.</p>';
      }
    }

    function onScanSuccess(decodedText) {
      const code = decodedText.trim();
      if (!code) return;
      const existing = scans.find(s => s.code === code);
      if (existing) {
        existing.count += 1;
        existing.status = 'duplicate';
        saveState();
        renderTable();
        showLastScan(code, true);
        showAlert('⚠️ Código duplicado: ' + code, 'warning');
      } else {
        pendingCode = code;
        document.getElementById('modalCode').textContent = '📦 ' + code;
        document.getElementById('modalNameInput').value = '';
        document.getElementById('nameModal').classList.add('active');
        setTimeout(() => document.getElementById('modalNameInput').focus(), 300);
      }
    }

    function onScanError(err) {
      // ignore - camera keeps trying
    }

    function saveName() {
      const name = document.getElementById('modalNameInput').value.trim();
      if (pendingCode) {
        scans.push({ code: pendingCode, name: name || '', count: 1, status: 'unique' });
        saveState();
        renderTable();
        showLastScan(pendingCode, false);
        showAlert('✅ Código nuevo: ' + pendingCode, 'success');
      }
      pendingCode = null;
      document.getElementById('nameModal').classList.remove('active');
    }

    function skipName() {
      document.getElementById('modalNameInput').value = '';
      saveName();
    }

    // Allow Enter key to save name
    document.getElementById('modalNameInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveName();
    });

    function updateName(code, newName) {
      const scan = scans.find(s => s.code === code);
      if (scan) {
        scan.name = newName;
        saveState();
      }
    }

    function showLastScan(code, isDuplicate) {
      const el = document.getElementById('lastScan');
      el.textContent = 'Último: ' + code;
      el.style.color = isDuplicate ? '#ff6b6b' : '#52b788';
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = type;
      clearTimeout(el._timeout);
      el._timeout = setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    function saveState() {
      localStorage.setItem(STATE_KEY, JSON.stringify(scans));
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const count = document.getElementById('scanCount');

      const sorted = [...scans].sort((a, b) => {
        if (a.status === 'duplicate' && b.status !== 'duplicate') return -1;
        if (a.status !== 'duplicate' && b.status === 'duplicate') return 1;
        return 0;
      });

      tbody.innerHTML = sorted.map((s, i) => {
        const isDup = s.status === 'duplicate';
        const safeCode = escapeHtml(s.code);
        const safeName = escapeHtml(s.name || '');
        return `
          <tr class="${isDup ? 'duplicate' : 'unique'}">
            <td class="status-icon">${isDup ? '⚠️' : '✅'}</td>
            <td>${safeCode}</td>
            <td><input type="text" class="name-input" value="${safeName}" data-code="${safeCode}" placeholder="Nombre..." onchange="updateName(this.dataset.code, this.value)"></td>
            <td>${s.count}</td>
            <td class="${isDup ? 'status-duplicate' : 'status-unique'}">${isDup ? 'REPETIDO' : 'Único'}</td>
          </tr>
        `;
      }).join('');

      count.textContent = scans.length + ' escaneados';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function exportExcel() {
      const duplicates = scans.filter(s => s.status === 'duplicate');
      if (duplicates.length === 0) {
        showAlert('No hay códigos repetidos para exportar', 'warning');
        return;
      }

      const data = duplicates.map((s, i) => ({
        '#': i + 1,
        'Código': s.code,
        'Nombre': s.name || '',
        'Veces escaneado': s.count
      }));

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.json_to_sheet(data);
      XLSX.utils.book_append_sheet(wb, ws, 'Duplicados');
      XLSX.writeFile(wb, 'codigos_duplicados_' + Date.now() + '.xlsx');
      showAlert('✅ Excel exportado con ' + duplicates.length + ' duplicados', 'success');
    }

    function syncToSheets() {
      if (!SHEETS_URL) {
        showAlert('Configurá la URL de Google Sheets en el código', 'warning');
        return;
      }
      fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scans })
      }).then(() => showAlert('✅ Datos enviados a Google Sheets', 'success'))
        .catch(() => showAlert('❌ Error al enviar a Sheets', 'warning'));
    }

    function clearAll() {
      if (!confirm('¿Limpiar todos los escaneos?')) return;
      scans = [];
      saveState();
      renderTable();
      document.getElementById('lastScan').textContent = 'Esperando código...';
      document.getElementById('scanCount').textContent = '0 escaneados';
    }

    startScanner();
    renderTable();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
